name: "Test: Upstream Cross-Org Bug"
run-name: Test Upstream Cross-Org Bug

"on":
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  reproduce:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: ghcr-cleanup-action cross-org-bug--${{ github.run_id }}
      IMAGE_REF: ghcr.io/${{ vars.GHCR_TEST_OWNER }}/ghcr-cleanup-action-cross-org-bug--${{ github.run_id }}
    steps:
      - name: Require test org configuration
        shell: bash
        env:
          GHCR_TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
          GHCR_TEST_PAT_USERNAME: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          GHCR_TEST_PAT: ${{ secrets.GHCR_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GHCR_TEST_OWNER" ]] || { echo "Missing repo variable GHCR_TEST_OWNER" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT_USERNAME" ]] || { echo "Missing repo variable GHCR_TEST_PAT_USERNAME" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT" ]] || { echo "Missing repo secret GHCR_TEST_PAT" >&2; exit 1; }

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          password: ${{ secrets.GHCR_TEST_PAT }}

      - name: Push repro image
        shell: bash
        run: |
          set -euo pipefail
          docker pull --platform linux/amd64 alpine:3.22
          docker tag alpine:3.22 "${IMAGE_REF}:delete-me"
          docker push "${IMAGE_REF}:delete-me"

      - name: Execute ghcr-cleanup-action action
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.GHCR_TEST_PAT }}
          owner: ${{ vars.GHCR_TEST_OWNER }}
          package: ${{ env.PACKAGE_NAME }}
          delete-tags: delete-me
