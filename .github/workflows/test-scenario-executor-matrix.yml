name: Test Scenario Executor Matrix
run-name: Test Scenario Executor Matrix

"on":
  workflow_dispatch:
    inputs:
      upload_db_artifact:
        description: Upload the final rescan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      db_artifact_encryption_passphrase:
        description: Optional passphrase for encrypting uploaded DB artifacts; required for non-public registries.
        required: false
        default: ""
        type: string
      artifact_retention_days:
        description: Optional artifact retention-days override for action-owned DB uploads.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  actions: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Render scenario matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "matrix=$(node tools/render-test-scenario-matrix.mjs)" >> "$GITHUB_OUTPUT"

  execute:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/test-scenario-executor.yml
    secrets: inherit
    with:
      scenario: ${{ matrix.scenario }}
      executor: ${{ matrix.executor }}
      upload_db_artifact: ${{ inputs.upload_db_artifact }}
      db_artifact_encryption_passphrase: ${{ inputs.db_artifact_encryption_passphrase }}
      artifact_retention_days: ${{ inputs.artifact_retention_days }}
      package_name_suffix: ${{ matrix.executor }}

  bundle-db-artifacts:
    if: ${{ always() && inputs.upload_db_artifact }}
    needs: execute
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download scenario DB artifacts
        id: download
        shell: bash
        env:
          ARTIFACT_LIST_PATH: ${{ runner.temp }}/ghcr-manager/scenario-matrix-db-merge/artifacts.tsv
          DB_ARTIFACT_ENCRYPTION_PASSPHRASE: ${{ inputs.db_artifact_encryption_passphrase }}
          DOWNLOAD_DIR: ${{ runner.temp }}/ghcr-manager/scenario-matrix-db-merge/downloaded
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_VERSION: "2022-11-28"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          MERGED_DB_PATH: ${{ runner.temp }}/ghcr-manager/scenario-matrix-db-merge/scenario-matrix.sqlite
          SOURCE_DB_DIR: ${{ runner.temp }}/ghcr-manager/scenario-matrix-db-merge/source-dbs
        run: |
          set -euo pipefail

          tools/download-run-db-artifacts.sh

          echo "artifact_list_path=$ARTIFACT_LIST_PATH" >> "$GITHUB_OUTPUT"
          echo "merged_db_path=$MERGED_DB_PATH" >> "$GITHUB_OUTPUT"
          {
            echo "source_db_paths<<EOF"
            find "$SOURCE_DB_DIR" -maxdepth 1 -type f -name '*.sqlite' | sort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Merge scenario DB artifacts
        id: merge
        uses: ./db-merge
        with:
          db-path: ${{ steps.download.outputs.merged_db_path }}
          upload-db-artifact: "true"
          db-artifact-encryption-passphrase: ${{ inputs.db_artifact_encryption_passphrase }}
          db-artifact-retention-days: ${{ inputs.artifact_retention_days }}
          source-db-paths: ${{ steps.download.outputs.source_db_paths }}

      - name: Delete per-scenario DB artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_VERSION: "2022-11-28"
          GITHUB_REPOSITORY: ${{ github.repository }}
          ARTIFACT_LIST_PATH: ${{ steps.download.outputs.artifact_list_path }}
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r artifact_id artifact_name _artifact_url; do
            gh api \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: $GITHUB_API_VERSION" \
              "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id"
            echo "Deleted intermediate DB artifact: $artifact_name"
          done < "$ARTIFACT_LIST_PATH"
