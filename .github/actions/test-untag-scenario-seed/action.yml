name: Test Untag Scenario Seed
description: Clear and seed one minimal GHCR untag scenario package.

inputs:
  image_ref:
    description: Full ghcr.io image reference without tag.
    required: true
  scenario_id:
    description: Untag scenario identifier.
    required: true
  registry_username:
    description: GHCR username used for docker login.
    required: true
  registry_password:
    description: GHCR token or password used for docker login.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ inputs.registry_username }}
        password: ${{ inputs.registry_password }}

    - name: Seed untag-single-tag-single-root
      if: ${{ inputs.scenario_id == 'untag-single-tag-single-root' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: ${{ inputs.scenario_id }}
      run: |
        set -euo pipefail

        keep_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$keep_dir/Dockerfile"
        printf '%s\n' "keep-tagged" > "$keep_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--keep" \
          "$keep_dir"

        delete_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$delete_dir/Dockerfile"
        printf '%s\n' "delete-me-tagged" > "$delete_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--delete-me" \
          "$delete_dir"

    - name: Seed untag-one-of-two-tags-single-root
      if: ${{ inputs.scenario_id == 'untag-one-of-two-tags-single-root' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: ${{ inputs.scenario_id }}
      run: |
        set -euo pipefail
        context_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$context_dir/Dockerfile"
        printf '%s\n' "$SCENARIO_ID" > "$context_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--delete-me" \
          --tag "$IMAGE_REF:${SCENARIO_ID}--keep-me" \
          "$context_dir"

    - name: Prepare docker manifest-list untag contexts
      if: ${{ inputs.scenario_id == 'untag-one-of-two-tags-docker-manifest-list' }}
      id: docker-manifest-list-contexts
      shell: bash
      env:
        SCENARIO_ID: ${{ inputs.scenario_id }}
      run: |
        set -euo pipefail
        base_dir="$(mktemp -d)"

        amd64_dir="$base_dir/amd64"
        mkdir -p "$amd64_dir"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$amd64_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} amd64" > "$amd64_dir/payload.txt"

        arm64_dir="$base_dir/arm64"
        mkdir -p "$arm64_dir"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$arm64_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} arm64" > "$arm64_dir/payload.txt"

        echo "amd64_dir=$amd64_dir" >> "$GITHUB_OUTPUT"
        echo "arm64_dir=$arm64_dir" >> "$GITHUB_OUTPUT"

    - name: Build docker manifest-list amd64 child
      if: ${{ inputs.scenario_id == 'untag-one-of-two-tags-docker-manifest-list' }}
      shell: bash
      env:
        AMD64_DIR: ${{ steps.docker-manifest-list-contexts.outputs.amd64_dir }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: ${{ inputs.scenario_id }}
      run: |
        set -euo pipefail
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${GITHUB_RUN_ID}-${SCENARIO_ID}-amd64-test" \
          "$AMD64_DIR"

    - name: Build docker manifest-list arm64 child
      if: ${{ inputs.scenario_id == 'untag-one-of-two-tags-docker-manifest-list' }}
      shell: bash
      env:
        ARM64_DIR: ${{ steps.docker-manifest-list-contexts.outputs.arm64_dir }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: ${{ inputs.scenario_id }}
      run: |
        set -euo pipefail
        docker buildx build \
          --platform linux/arm64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${GITHUB_RUN_ID}-${SCENARIO_ID}-arm64-test" \
          "$ARM64_DIR"

    - name: Publish docker manifest-list shared root
      if: ${{ inputs.scenario_id == 'untag-one-of-two-tags-docker-manifest-list' }}
      shell: bash
      env:
        GITHUB_RUN_ID: ${{ github.run_id }}
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: ${{ inputs.scenario_id }}
      run: |
        set -euo pipefail

        source_amd64_ref="$IMAGE_REF:${GITHUB_RUN_ID}-${SCENARIO_ID}-amd64-test"
        source_arm64_ref="$IMAGE_REF:${GITHUB_RUN_ID}-${SCENARIO_ID}-arm64-test"

        for target_tag in delete-me keep-me; do
          target_ref="$IMAGE_REF:${SCENARIO_ID}--${target_tag}"
          docker manifest create "$target_ref" "$source_amd64_ref" "$source_arm64_ref"
          docker manifest push "$target_ref"
        done

    - name: Reject unknown untag scenario
      if: >-
        ${{
          inputs.scenario_id != 'untag-single-tag-single-root' &&
          inputs.scenario_id != 'untag-one-of-two-tags-single-root' &&
          inputs.scenario_id != 'untag-one-of-two-tags-docker-manifest-list'
        }}
      shell: bash
      run: |
        set -euo pipefail
        echo "Unknown untag scenario: ${{ inputs.scenario_id }}" >&2
        exit 1
